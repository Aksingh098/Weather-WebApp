<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h2>Weather</h2>
        <div class="weather-input">
          <label for="city_input" class="visually-hidden">City name</label>
          <input
            type="text"
            name="city"
            id="city_input"
            placeholder="Enter city name"
            aria-label="City name"
          />
          <button type="button" id="searchButton">
            <i class="fa-solid fa-magnifying-glass"></i> Search
          </button>
          <button type="button" id="locationButton">
            <i class="bx bx-current-location"></i> Current Location
          </button>
        </div>
      </header>

      <main class="weather-data">
        <section class="card current-card">
          <div class="current-weather">
            <div class="current-weather__readout">
              <p class="eyebrow">Now</p>
              <h2 id="temperature" class="temp">--&deg;</h2>
              <p id="description" class="condition">Crazy Storm</p>
            </div>
            <div class="weather-icon">
              <img id="weatherIcon" src="" alt="" />
            </div>
          </div>
          <hr />
          <div class="card-footer">
            <p>
              <i class="bx bx-calendar"></i> <span id="dateDisplay">--</span>
            </p>
            <p>
              <i class="bx bx-map"></i> <span id="locationDisplay">--</span>
            </p>
          </div>
        </section>
        <section class="card details-card" aria-label="Weather details">
          <h3 class="section-title">Details</h3>
          <div class="details-grid">
            <div class="detail">
              <i class="bx bx-water"></i>
              <p class="detail__label">Humidity</p>
              <p class="detail__value"><span id="humidity">--</span>%</p>
            </div>
            <div class="detail">
              <i class="bx bx-wind"></i>
              <p class="detail__label">Wind</p>
              <p class="detail__value"><span id="wind">--</span> km/h</p>
            </div>
            <div class="detail">
              <i class="fa-solid fa-temperature-half"></i>
              <p class="detail__label">Feels like</p>
              <p class="detail__value"><span id="feelsLike">--</span>&deg;C</p>
            </div>
            <div class="detail">
              <i class="bx bx-tachometer"></i>
              <p class="detail__label">Pressure</p>
              <p class="detail__value"><span id="pressure">--</span> hPa</p>
            </div>
            <div class="detail">
              <i class="bx bx-show"></i>
              <p class="detail__label">Visibility</p>
              <p class="detail__value"><span id="visibility">--</span> km</p>
            </div>
            <div class="detail">
              <i class="bx bx-cloud"></i>
              <p class="detail__label">Cloudiness</p>
              <p class="detail__value"><span id="cloudiness">--</span>%</p>
            </div>
          </div>
        </section>
        <section class="card forecast-card" aria-label="5 day forecast">
          <h3 class="section-title">5-Day Forecast</h3>
          <div class="forecast-grid" id="forecastList">
            
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
